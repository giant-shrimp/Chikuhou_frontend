name: Check and test the source code
on:
 pull_request:
  branches:
   - main
jobs:
 test:
  name: Check the source code
  runs-on: windows-latest
  steps:
   - uses: actions/checkout@v3
   - uses: subosito/flutter-action@v2.3.0
     with:
      flutter-version: '3.24.5'
   - name: Install packages
     run: flutter pub get
   - name: Inject API keys
     shell: bash
     run: |
       sed -i "s|__GOOGLE_MAPS_API_KEY__|${{ secrets.GOOGLE_MAPS_API_KEY }}|g" web/index.html
   - name: Linter
     run: flutter analyze
   - name: Test
     run: flutter test
